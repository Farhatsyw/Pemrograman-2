<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- th:fragment head: judul halaman + CSS -->
    <th:block th:fragment="head(title)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${title} + ' - Hotel Pamulang'">Hotel Pamulang</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </th:block>
</head>
<body>

    <!-- th:fragment navbar -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fa-solid fa-hotel me-2"></i>Hotel <span class="text-accent">Pamulang</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" th:href="@{/}">
                            <i class="fa-solid fa-house me-1"></i>Beranda
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'kamar'} ? 'active'" th:href="@{/kamar}">
                            <i class="fa-solid fa-bed me-1"></i>Daftar Kamar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'reservasi'} ? 'active'" th:href="@{/reservasi}">
                            <i class="fa-solid fa-book me-1"></i>Reservasi
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-accent btn-sm px-3" th:href="@{/reservasi/tambah}">
                            <i class="fa-solid fa-plus me-1"></i>Reservasi Baru
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- th:fragment footer -->
    <footer th:fragment="footer" class="app-footer text-center py-4 mt-5">
        <div class="container">
            <small>
                &copy; 2026 Hotel Pamulang Reservation System &mdash;
                Tugas UAS Pemrograman II, Teknik Informatika S1, Universitas Pamulang
            </small>
        </div>
    </footer>

    <script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
