# =========================================
# KONFIGURASI APLIKASI
# =========================================
spring.application.name=Reservasi Hotel

# =========================================
# KONFIGURASI DATABASE (JDBC - MySQL)
# Sesuaikan username/password dengan MySQL di komputer masing-masing
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_reservasi_hotel?useSSL=false&serverTimezone=Asia/Jakarta&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# KONFIGURASI JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jalankan data.sql setelah tabel dibuat oleh Hibernate
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# =========================================
# KONFIGURASI THYMELEAF
# =========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =========================================
# PORT SERVER
# =========================================
server.port=8080
